<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    background: linear-gradient(180deg, #0f0c29, #1c1d64);
    font-family: "Poppins", sans-serif;
    color: white;
}


.nav{
    height: 70px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center; 
    justify-content: space-between;
    padding: 0 40px;
}

.logo{
    font-weight: bold;
    font-size: 22px;
    background: linear-gradient(45deg,#a855f7,#6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

.links a{
    color: white;
    text-decoration: none;
    margin-left: 20px;
    position: relative;
}

.links a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#a855f7;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

.links a:hover::after{
    width:100%;
}

.intro{
    text-align: center;
    padding: 60px 20px;
}

.intro h1{
    font-size: 60px;
    background: linear-gradient(45deg,#a855f7,#6366f1);
    -webkit-background-clip: text;
    color: transparent;
    animation: slideUp 1s ease;
}

.intro p{
    max-width: 600px;
    margin: auto;
    color: #ccc;
    margin-top: 10px;
    animation: fadeIn 1.5s ease;
}


#para1{
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 25px;
    flex-wrap: wrap;
}

#para1 span{
    background: rgba(255,255,255,0.08);
    padding: 10px 18px;
    border-radius: 30px;
    transition: 0.3s;
}

#para1 span:hover{
    background: #a855f7;
    transform: translateY(-3px);
}

.work h1{
    text-align: center;
    font-size: 50px;
    margin-top: 40px;
}


.work-section{
    width: 90%;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}


.work-card{
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.4s;
}

.work-card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s;
}

.work-card:hover img{
    transform: scale(1.1);
}


.work-card.large{
    grid-column: span 2;
    height: 320px;
}

.work-card.small{
    height: 200px;
}


.work-overlay{
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    font-weight: 500;
}

.footer{
    background: black;
    text-align: center;
    padding: 40px;
}

.social-icons{
    margin-top: 15px;
}

.social-icons a{
    margin: 0 12px;
    font-size: 22px;
    color:white;
    transition: 0.3s;
}

.social-icons a:hover{
    color: #a855f7;
    transform: scale(1.3);
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}


@media(max-width:768px){

    .intro h1{
        font-size: 35px;
    }

    .work h1{
        font-size: 35px;
    }

    .work-section{
        grid-template-columns: 1fr;
    }

    .work-card.large{
        grid-column: span 1;
    }

    .nav{
        padding: 0 20px;
    }

}

</style>
</head>

<body>

<nav class="nav">
    <div class="logo">SUYASH</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="work.html">Work</a>
        <a href="#">Contact</a>
    </div>
</nav>

<div class="intro">
    <h1>Hi, I'M SUYASH</h1>
    <p>I build modern websites with clean UI and smooth animations.</p>

    <div id="para1">
        <span>HTML</span>
        <span>CSS</span>
        <span>Design</span>
    </div>
</div>

<div class="work">
    <h1>WORK</h1>
</div>

<div class="work-section">

    
    <div class="work-card large">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <div class="work-overlay">Featured Project</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.co4fa702d">
        <div class="work-overlay">UI Design</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/phbab8c">
        <div class="work-overlay">Dashboard</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/ph69166">
        <div class="work-overlay">Project</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/ph-dfb367046420">
        <div class="work-overlay">Gaming UI</div>
    </div>

</div>

<footer class="footer">
    <p>© 2026 Suyash Singh</p>

        <a href="https://instagram.com/suyash_singh563" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://discord.com" target="_blank">
            <i class="fab fa-discord"></i>
        </a>

        <a href="https://github.com/suyashsinghdev" target="_blank">
            <i class="fab fa-github"></i>
</footer>

</body>
</html>
