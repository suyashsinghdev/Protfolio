<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0f0c29, #1c1d64);
    font-family: "Poppins", sans-serif;
    color: white;
}


.nav{
    height: 60px;
    background: black;
    display: flex;
    align-items: center; 
    justify-content: space-between;
    padding: 0 40px;
}

.logo{
    color: white;
    font-weight: bold;
    font-size: 20px;
    animation: slideDown 1s forwards;
}

.links a{
    color: white;
    text-decoration: none;
    margin-left: 15px;
    animation: slideDown 1s forwards;
}

.links a:hover{
    background: #a855f7;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
}


.intro{
    text-align: center;
    padding: 40px;
}

.intro h1{
    font-size: 60px;
    animation: slideUp 1s forwards;
}

.intro p{
    max-width: 600px;
    margin: auto;
    color: #ccc;
    animation: slideUp 1s 0.3s forwards;
}


#para1{
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

#para1 span{
    background: rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 20px;
    transition: 0.3s;
}

#para1 span:hover{
    background: #a855f7;
    color: white;
}

.work h1{
    text-align: center;
    font-size: 60px;
    margin-top: 60px;
}

.work-section{
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}

.work-card{
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    animation: fadeIn 1s ease forwards;
}

.work-card img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

.work-card:hover img{
    transform: scale(1.08);
}

.work-card.large{
    grid-column: span 2;
    height: 300px;
}

.work-card.small{
    height: 200px;
}

.work-overlay{
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    color: white;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}


.footer{
    background: black;
    color: white;
    text-align: center;
    padding: 30px;
    margin-top: 60px;
}

.social-icons{
    margin-top: 10px;
}

.social-icons a{
    color: white;
    margin: 0 10px;
    font-size: 20px;
    transition: 0.3s;
}

.social-icons a:hover{
    color: #a855f7;
    transform: scale(1.2);
}


@keyframes slideDown {
    from {opacity:0; transform:translateY(-40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<nav class="nav">
    <div class="logo">SUYASH SINGH</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="">Contact</a>
    </div>
</nav>

<div class="intro">
    <h1>Hi, I'M SUYASH</h1>
    <p>I build modern websites with clean UI and smooth animations.</p>

    <div id="para1">
        <span>HTML</span>
        <span>CSS</span>
        <span>Design</span>
    </div>
</div>

<div class="work">
    <h1>WORK</h1>
</div>

<div class="work-section">

    <div class="work-card large">
        <img src="https://images.unsplash.com/photo49f4df085">
        <div class="work-overlay">Featured Project</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/photo-15590a702d">
        <div class="work-overlay">UI Design</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/p2-14dd9538aa97">
        <div class="work-overlay">Dashboard</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplas0-34d0984388bd">
        <div class="work-overlay">Project</div>
    </div>

    <div class="work-card small">
        <img src="https://images.unsplash.com/photo-047-dfb367046420">
        <div class="work-overlay">Gaming UI</div>
    </div>

</div>

<footer class="footer">
    <p>© 2026 Suyash Singh</p>

    <div class="social-icons">
        <a href="https://instagram.com/suyash_singh563" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://discord.com" target="_blank">
            <i class="fab fa-discord"></i>
        </a>

        <a href="https://github.com/suyashsinghdev" target="_blank">
            <i class="fab fa-github"></i>
        </a>
    </div>
</footer>

</body>
</html>
